<?xml version="1.0" encoding="UTF-8"?>
<!--
  logo.svg  ·  Money-Manager Marken-"MM" (Revolut-Stil, hell & clean)
  ==================================================================
  Zwei geometrische "M" nebeneinander, flach und ruhig:
    M LINKS  = Anthrazit (#1f2937)  -> serioes, "Bank"
    M RECHTS = ruhiges Gruen (#059669) -> Geld/Wachstum (der eine Akzent)
  Die Zickzack-Form liest sich zugleich wie eine Chart-Linie.
  Runde Ecken (stroke-linecap/join round), kein Verlauf, kein Glow.
  FARBEN aendern: einfach die zwei stroke-Werte unten anpassen.
  Transparenter Hintergrund, ViewBox 0..64 -> verlustfrei skalierbar.
-->
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Money Manager">
  <!-- M links (Anthrazit) -->
  <polyline points="10 43 10 21 20 36.5 30 21 30 43"
            stroke="#1f2937" stroke-width="6" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- M rechts (Gruen = Akzent) -->
  <polyline points="36 43 36 21 46 36.5 56 21 56 43"
            stroke="#059669" stroke-width="6" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
