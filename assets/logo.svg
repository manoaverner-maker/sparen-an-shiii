<?xml version="1.0" encoding="UTF-8"?>
<!--
  logo.svg  ·  Sparkurs App-Emblem
  ==================================================================
  Das quadratische Marken-Emblem der App. Es wird mehrfach benutzt:
   - im Header der App (neben dem Schriftzug "Sparkurs")
   - als Favicon (favicon.svg ist eine Kopie davon)
   - als Vorlage fuer die PNG-App-Icons (Homescreen / PWA-Manifest)

  Bildidee (3 Finanz-Motive kombiniert):
   1. SCHILD  -> steht fuer Kontrolle und Schutz deines Geldes
   2. BALKEN + TRENDLINIE nach oben -> Wachstum / dein Sparkurs steigt
   3. GOLDENE MUENZE am oberen Ende der Linie -> das Geld, das waechst

  Farben passend zum Dark-Theme der App:
   - Smaragd/Tuerkis-Verlauf  = "Geld waechst"
   - Gold                      = Akzent / Wert
   - tiefes Navy/Anthrazit     = Schild-Hintergrund
  ViewBox 0..64, damit es in jeder Groesse gestochen scharf bleibt.
-->
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sparkurs Logo">
  <defs>
    <!-- dunkler Schild-Hintergrund (Navy -> fast schwarz) -->
    <linearGradient id="sk-shield" x1="32" y1="3" x2="32" y2="61" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b2a38"/>
      <stop offset="1" stop-color="#0c151d"/>
    </linearGradient>
    <!-- Smaragd -> Tuerkis fuer Balken und Linie -->
    <linearGradient id="sk-grow" x1="16" y1="50" x2="48" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0fd99a"/>
      <stop offset="1" stop-color="#1fc8e3"/>
    </linearGradient>
    <!-- Gold fuer die Muenze -->
    <radialGradient id="sk-coin" cx="0.35" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#ffe6a0"/>
      <stop offset="0.55" stop-color="#f4c14b"/>
      <stop offset="1" stop-color="#d29a25"/>
    </radialGradient>
    <!-- weicher Schein hinter der Linie -->
    <linearGradient id="sk-stroke" x1="14" y1="48" x2="46" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19e3a6"/>
      <stop offset="1" stop-color="#33d3ef"/>
    </linearGradient>
  </defs>

  <!-- Schild-Koerper -->
  <path d="M32 4 L54 11.5 V30 C54 44 45.5 53.5 32 60 C18.5 53.5 10 44 10 30 V11.5 Z"
        fill="url(#sk-shield)" stroke="#2f4456" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- feiner Glanz-Rand oben im Schild -->
  <path d="M32 7 L51 13.4 V20 C44 16.5 38 15.4 32 15.4 C26 15.4 20 16.5 13 20 V13.4 Z"
        fill="#ffffff" opacity="0.05"/>

  <!-- aufsteigende Balken (Wachstum), Grundlinie bei y=47 -->
  <g opacity="0.92">
    <rect x="19" y="37" width="6.5" height="10" rx="1.6" fill="url(#sk-grow)" opacity="0.55"/>
    <rect x="28" y="31" width="6.5" height="16" rx="1.6" fill="url(#sk-grow)" opacity="0.78"/>
    <rect x="37" y="24" width="6.5" height="23" rx="1.6" fill="url(#sk-grow)"/>
  </g>

  <!-- Trendlinie nach oben, endet in der Muenze -->
  <path d="M17 43 L29 35 L40 26" fill="none" stroke="url(#sk-stroke)" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="17" cy="43" r="2.4" fill="#19e3a6"/>

  <!-- goldene Muenze am Spitzenpunkt -->
  <circle cx="44.5" cy="21.5" r="8.2" fill="url(#sk-coin)" stroke="#b9831c" stroke-width="0.8"/>
  <circle cx="44.5" cy="21.5" r="5.6" fill="none" stroke="#b9831c" stroke-width="0.9" opacity="0.55"/>
  <!-- Schweizer Franken-Markierung "Fr" auf der Muenze -->
  <text x="44.5" y="25.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="7.3" font-weight="700" fill="#7a5510">Fr</text>
</svg>
