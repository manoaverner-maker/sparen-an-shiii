<!doctype html><html><head><meta charset="utf-8">
<!-- Hilfsseite NUR zum Erzeugen der PNG-App-Icons (iOS-Stil): das
     Marken-"S" (Variante Ribbon) auf hellem, abgerundetem Quadrat.
     ?bleed=1 -> randlos (fuer maskable / apple-touch). Sonst abgerundet. -->
<style>
  html,body{margin:0;padding:0;width:100%;height:100%}
  svg{display:block;width:100%;height:100%}
</style></head>
<body>
  <svg id="ic" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
    <rect id="bg" width="512" height="512" rx="112" fill="#f5f8f6"/>
    <g id="mark" transform="translate(87,87) scale(5.28)">
      <defs>
        <linearGradient id="it" x1="20" y1="10" x2="40" y2="38" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#4ff2d6"/><stop offset="1" stop-color="#12c994"/></linearGradient>
        <linearGradient id="ib" x1="22" y1="30" x2="40" y2="54" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#15d09c"/><stop offset="1" stop-color="#08a06f"/></linearGradient>
      </defs>
      <path d="M31 31.5 L 38 33.5 C 48 37.5, 47.5 47, 38.5 50 C 31 52.5, 20.5 51.5, 17 45" fill="none" stroke="url(#ib)" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 18 C 43 12, 32 11, 25 14 C 16.5 17.5, 16 27, 26 30.5 L 34 32.5" fill="none" stroke="url(#it)" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="27" y="27.5" width="11.5" height="9.5" rx="4.5" fill="#0a8a66" transform="rotate(22 32.5 32.5)"/>
      <path d="M43.5 22 L49.5 10.5 L54 17 Z" fill="url(#it)"/>
    </g>
  </svg>
<script>
  if (new URLSearchParams(location.search).get('bleed')) {
    document.getElementById('bg').setAttribute('rx','0');
    document.getElementById('mark').setAttribute('transform','translate(96,96) scale(5.0)');
  }
</script>
</body></html>
