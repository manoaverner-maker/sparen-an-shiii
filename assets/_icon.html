<!doctype html><html><head><meta charset="utf-8">
<!-- Hilfsseite NUR zum Erzeugen der PNG-App-Icons (iOS-Stil): das
     Marken-"MM" (Money Manager) auf weissem, abgerundetem Quadrat.
     ?bleed=1 -> randlos (fuer maskable / apple-touch). Sonst abgerundet. -->
<style>
  html,body{margin:0;padding:0;width:100%;height:100%}
  svg{display:block;width:100%;height:100%}
</style></head>
<body>
  <svg id="ic" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
    <rect id="bg" width="512" height="512" rx="112" fill="#ffffff"/>
    <g id="mark" transform="translate(25,32) scale(7)">
      <polyline points="10 43 10 21 20 36.5 30 21 30 43"
                stroke="#1f2937" stroke-width="6" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="36 43 36 21 46 36.5 56 21 56 43"
                stroke="#059669" stroke-width="6" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </svg>
<script>
  if (new URLSearchParams(location.search).get('bleed')) {
    document.getElementById('bg').setAttribute('rx','0');
    document.getElementById('mark').setAttribute('transform','translate(38,45) scale(6.6)');
  }
</script>
</body></html>
